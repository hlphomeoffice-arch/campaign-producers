name: Weekly Campaign Insight

on:
  schedule:
    - cron: "17 8 * * 2"
      timezone: "Europe/London"
  workflow_dispatch:
    inputs:
      topic:
        description: "Optional subject for this article"
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: weekly-campaign-insight
  cancel-in-progress: false

jobs:
  prepare-draft:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the website
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Avoid duplicate editorial drafts
        id: guard
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          open_count="$(gh pr list --state open --search 'Weekly industry insight in:title' --json number --jq 'length')"
          if [ "$open_count" -gt 0 ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "An editorial draft is already waiting for review." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node.js
        if: steps.guard.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"

      - name: Confirm the OpenAI credential
        if: steps.guard.outputs.skip != 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "::error::Add OPENAI_API_KEY under Settings, Secrets and variables, Actions, then run this workflow again."
            exit 1
          fi

      - name: Research and write the insight
        if: steps.guard.outputs.skip != 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          REQUESTED_TOPIC: ${{ inputs.topic || '' }}
        run: node automation/generate-weekly-insight.mjs

      - name: Validate the website changes
        if: steps.guard.outputs.skip != 'true'
        run: node automation/validate-site.mjs

      - name: Open the review draft
        if: steps.guard.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          article_date="$(node -e "const fs=require('fs');const h=JSON.parse(fs.readFileSync('automation/editorial-history.json'));process.stdout.write(h.posts[0].date)")"
          article_title="$(node -e "const fs=require('fs');const h=JSON.parse(fs.readFileSync('automation/editorial-history.json'));process.stdout.write(h.posts[0].title)")"
          branch="automation/weekly-insight-${article_date}-${GITHUB_RUN_ID}"

          git config user.name "Campaign Producers Editorial"
          git config user.email "henk@campaignproducers.com"
          git switch -c "$branch"
          git add insights rss.xml sitemap.xml automation/editorial-history.json automation/latest-linkedin-post.txt
          git commit -m "Add weekly campaign insight for ${article_date}"
          git push --set-upstream origin "$branch"

          body_file="$RUNNER_TEMP/weekly-insight-pr.md"
          printf '%s\n\n' "## What changed" > "$body_file"
          printf '%s\n\n' "A new source-backed Campaign Producers insight has been researched and written for Tuesday publication." >> "$body_file"
          printf '%s\n\n' "## Review before publishing" >> "$body_file"
          printf '%s\n' "- Read the article and check that the point of view sounds like Henk." >> "$body_file"
          printf '%s\n' "- Open each source and confirm it supports the associated claims." >> "$body_file"
          printf '%s\n' "- Check the headline, dates, names and any figures." >> "$body_file"
          printf '%s\n\n' "- Merge this pull request when the article is ready to publish." >> "$body_file"
          printf '%s\n\n' "## LinkedIn draft" >> "$body_file"
          printf '%s\n' '```text' >> "$body_file"
          sed -n '1,220p' automation/latest-linkedin-post.txt >> "$body_file"
          printf '%s\n' '```' >> "$body_file"
          printf '%s\n\n' "## Validation" >> "$body_file"
          printf '%s\n' "The Insights pages, local links, structured data, RSS feed, sitemap and editorial history passed the automated checks." >> "$body_file"

          gh pr create \
            --draft \
            --base main \
            --head "$branch" \
            --title "Weekly industry insight: ${article_title}" \
            --body-file "$body_file"

          printf '%s\n' "Draft created: ${article_title}" >> "$GITHUB_STEP_SUMMARY"
